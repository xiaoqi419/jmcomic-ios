name: Build IPA

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Prebuild + Pods
        run: |
          npx expo prebuild --platform ios --no-install
          npx pod-install

      - name: Build unsigned IPA
        run: |
          cd ios
          # 查找正确的 workspace 和 scheme
          WS=$(ls -d *.xcworkspace 2>/dev/null | head -1)
          PR=$(ls -d *.xcodeproj 2>/dev/null | head -1)
          SC=$(echo "$PR" | sed 's/\.xcodeproj//')
          echo "WS=$WS SC=$SC"
          xcodebuild -workspace "$WS" \
            -scheme "$SC" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ../build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            DEVELOPMENT_TEAM="" \
            build 2>&1 | tee ../xcodebuild.log

      - name: Package IPA
        run: |
          APP=$(find build -name "*.app" -type d 2>/dev/null | head -1)
          if [ -z "$APP" ]; then
            echo "=== xcodebuild log ==="
            tail -30 xcodebuild.log
            echo "=== build dir ==="
            find build -maxdepth 4 -type d 2>/dev/null | head -20
            exit 1
          fi
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -r jmcomic-unsigned.ipa Payload/
          rm -rf Payload

      - uses: actions/upload-artifact@v4
        with:
          name: jmcomic-ipa
          path: jmcomic-unsigned.ipa

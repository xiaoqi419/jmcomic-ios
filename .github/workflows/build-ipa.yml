name: Build IPA

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Prebuild + Pods
        run: |
          npx expo prebuild --platform ios --no-install
          npx pod-install

      - name: Build unsigned IPA
        run: |
          cd ios
          xcodebuild -workspace jmcomic.xcworkspace \
            -scheme jmcomic \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ../build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            DEVELOPMENT_TEAM="" \
            build 2>&1 | tee ../xcodebuild.log

      - name: Package IPA
        run: |
          APP=$(find build/Build/Products/Release-iphoneos -name "*.app" | head -1)
          if [ -z "$APP" ]; then
            echo "No .app found. Build output:"
            find build -name "*.app" 2>/dev/null || echo "No .app anywhere"
            cat xcodebuild.log | tail -50
            exit 1
          fi
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -r jmcomic-unsigned.ipa Payload/
          rm -rf Payload

      - uses: actions/upload-artifact@v4
        with:
          name: jmcomic-ipa
          path: jmcomic-unsigned.ipa

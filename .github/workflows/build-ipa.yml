name: Build IPA (Unsigned - 适合自签)

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Prebuild native project
        run: npx expo prebuild --platform ios --no-install

      - name: Build unsigned IPA
        run: |
          cd ios
          xcodebuild -workspace jmcomic.xcworkspace \
            -scheme jmcomic \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ../build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r "build/Build/Products/Release-iphoneos/jmcomic.app" Payload/
          zip -r jmcomic-unsigned.ipa Payload/
          rm -rf Payload

      - uses: actions/upload-artifact@v4
        with:
          name: jmcomic-ipa
          path: jmcomic-unsigned.ipa

name: Build IPA

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Prebuild + Pods
        run: |
          npx expo prebuild --platform ios --no-install
          npx pod-install

      - name: Build unsigned IPA
        run: |
          cd ios
          WORKSPACE=$(ls *.xcworkspace 2>/dev/null | head -1)
          SCHEME=$(ls *.xcodeproj 2>/dev/null | head -1 | sed 's/\.xcodeproj//')
          echo "Workspace: $WORKSPACE"
          echo "Scheme: $SCHEME"
          xcodebuild -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ../build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            DEVELOPMENT_TEAM="" \
            build 2>&1 | tee ../xcodebuild.log

      - name: Package IPA
        run: |
          APP=$(find build -name "*.app" -type d | head -1)
          if [ -z "$APP" ]; then
            echo "=== xcodebuild log (last 30 lines) ==="
            tail -30 xcodebuild.log
            echo "=== Directory tree ==="
            find build -type d 2>/dev/null | head -20 || echo "(no build dir)"
            exit 1
          fi
          echo "Found app: $APP"
          mkdir -p Payload
          cp -r "$APP" Payload/
          zip -r jmcomic-unsigned.ipa Payload/
          rm -rf Payload

      - uses: actions/upload-artifact@v4
        with:
          name: jmcomic-ipa
          path: jmcomic-unsigned.ipa

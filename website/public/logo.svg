<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E85D3A"/>
      <stop offset="100%" stop-color="#0A0A0F"/>
    </linearGradient>
  </defs>
  <!-- 圆角背景 -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- 打开的书本 -->
  <g transform="translate(106,130)" fill="none" stroke="#fff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
    <!-- 左页 -->
    <path d="M150 20 L150 230 C130 220 90 210 50 210 L50 20 C90 20 130 30 150 40Z" fill="rgba(255,255,255,0.15)"/>
    <!-- 右页 -->
    <path d="M150 20 L150 230 C170 220 210 210 250 210 L250 20 C210 20 170 30 150 40Z" fill="rgba(255,255,255,0.15)"/>
    <!-- 书脊 -->
    <line x1="150" y1="20" x2="150" y2="230"/>
    <!-- 左页文字线条 -->
    <line x1="75" y1="60" x2="130" y2="60" stroke-width="6" stroke="rgba(255,255,255,0.4)"/>
    <line x1="75" y1="90" x2="130" y2="90" stroke-width="6" stroke="rgba(255,255,255,0.4)"/>
    <line x1="75" y1="120" x2="120" y2="120" stroke-width="6" stroke="rgba(255,255,255,0.4)"/>
    <!-- 右页文字线条 -->
    <line x1="170" y1="60" x2="225" y2="60" stroke-width="6" stroke="rgba(255,255,255,0.4)"/>
    <line x1="170" y1="90" x2="225" y2="90" stroke-width="6" stroke="rgba(255,255,255,0.4)"/>
    <line x1="170" y1="120" x2="215" y2="120" stroke-width="6" stroke="rgba(255,255,255,0.4)"/>
  </g>
  <!-- 星星装饰 -->
  <g fill="#FFD700" opacity="0.8">
    <polygon points="340,100 350,130 380,130 355,150 365,180 340,160 315,180 325,150 300,130 330,130"/>
  </g>
</svg>
